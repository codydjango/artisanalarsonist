ds\/b\/64cf9085515bf81e6c4594b1ecf2cb677c7800f49047b993a187ac30fc46a28e\/IG_5.24.2024_66504d51114de3.06498768.jpeg","original":"\/uploads\/b\/64cf9085515bf81e6c4594b1ecf2cb677c7800f49047b993a187ac30fc46a28e\/IG_5.24.2024_66504d51114de3.06498768.jpeg","imageType":"background","sourceSet":{},"attribution":{}},"gradient":{"type":"linear","angle":180,"colors":[{"color":"--color-white","position":0},{"color":"--primary-color","position":100}]}},"textConfig":{"allCaps":false,"content":{"quill":{"ops":[{"insert":"\nI draw inspiration from connecting with the incredible and diverse natural beauty of Vancouver Island and the Salish Sea shores, which I am fortunate to call home.\n\nThe name Artisanal Arsonist is derived from a back-country experience with friends, as a result of my campfire building skills. "},{"insert":"\n","attributes":{"block":true}},{"insert":"\nI take great joy in \u201cfiring\u201d my art and hope that you love your pottery for many years to come.\n\nI am delighted to share the results of my deeply rooted creativity with you.\n\n\n"}]}},"fontSize":"step-1","textStyle":"body"},"titleConfig":{"align":false,"title":{"quill":{"ops":[{"insert":"Playing with fire + clay\u2026"},{"insert":"\n","attributes":{"block":true}}]}},"allCaps":false,"fontSize":"step-2","textStyle":"title"},"calloutConfig":{"hidden":true}}}},{"id":"2e890f80-45ef-11f0-ac0c-4f00475c5977","type":"cell","content":{"id":"2e7b7af0-45ef-11f0-ac0c-4f00475c5977","type":"block","layout":"text-and-image-overlapping-card","purpose":"text-and-image@^1.0.0","properties":{"shortID":"akbTJL","settings":{"texts":{"fontSize":"step-1","textStyle":"body"},"titles":{}},"textAlign":"center","background":{"type":"default","color":{"value":"--gray-light-two","isDark":false}},"repeatables":[{"id":1,"text":{"content":{"quill":{"ops":[{"insert":" Only food-safe glazes are used on my pottery\u2019s food surfaces.  I do not use any lead."},{"insert":"\n\n","attributes":{"align":"center"}},{"insert":"This is something I take great pride in.\u00a0"},{"insert":"\n\n","attributes":{"align":"center"}},{"insert":"I inspect each item to ensure the glaze was fired optimally.\u00a0"},{"insert":"\n\n","attributes":{"align":"center"}},{"insert":"This pottery is thrown using Canadian clay, and fired to 1204C \/ 2200F.\u00a0When cared for well, pottery of this quality can last decades and be passed down for generations.\u00a0I hope you will enjoy these pieces for years and years, and therefore I recommend hand-washing, and not leaving your  pottery to sit\/soak for long periods of time as all clay (even factory-made dishes) will absorb moisture over time.\u00a0"},{"insert":"\n\n","attributes":{"align":"center"}},{"insert":"Hand-wash your beautiful pottery and it will serve you many years of enjoyment."},{"insert":"\n","attributes":{"align":"center"}},{"insert":"\n"}]}}},"image":{"alt":"Food Safe Glazes and Caring for your Pottery, Artisanal Arsonist Pottery, Taryn Tilgner","figure":{"name":"IMG_9408.jpeg","size":{},"shape":{},"width":3500,"height":2334,"source":"\/uploads\/b\/64cf9085515bf81e6c4594b1ecf2cb677c7800f49047b993a187ac30fc46a28e\/IMG_9408_1719691683.jpeg","altText":"","original":"\/uploads\/b\/64cf9085515bf81e6c4594b1ecf2cb677c7800f49047b993a187ac30fc46a28e\/IMG_9408_1719691683.jpeg","sourceSet":{},"attribution":{},"cropOptions":null},"hidden":false},"title":{"tag":"h2","content":{"quill":{"ops":[{"insert":"Food Safe Glaze Info & Caring for your Pottery\n"}]}},"fontSize":"medium","textStyle":"title"},"button":{"label":"View products","hidden":true},"callout":{"tag":"h3","hidden":true,"content":{"quill":{"ops":[{"insert":"Conscious Craftsmanship\n"}]}},"fontSize":"medium","textStyle":"title"},"secondaryButton":{"label":"Learn more","hidden":true}}],"colorProfile":""}}},{"id":"e93fa470-45fd-11f0-94f0-ddd50d1c2914","type":"cell","content":{"id":"e939b100-45fd-11f0-94f0-ddd50d1c2914","type":"block","layout":"about-us-mission","purpose":"about-us@^1.0.0","properties":{"button":{"lin
